<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1Etiket — WhatsApp Yönetim Paneli</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111b21;
      --sidebar-bg: #1f2c34;
      --chat-bg: #0b141a;
      --msg-out: #005c4b;
      --msg-in: #202c33;
      --msg-human: #1a3a5c;
      --border: #2a3942;
      --text: #e9edef;
      --text-muted: #8696a0;
      --accent: #00a884;
      --accent-hover: #00c49a;
      --danger: #ea4335;
      --warning: #f5a623;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ===== LAYOUT ===== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 380px;
      min-width: 300px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 16px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-badge.connected { background: #00a884; color: #fff; }
    .status-badge.disconnected { background: var(--danger); color: #fff; }
    .status-badge.unknown { background: var(--text-muted); color: #fff; }

    .sidebar-stats {
      padding: 8px 16px;
      background: rgba(0,168,132,0.08);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .sidebar-stats span strong { color: var(--text); }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-tabs button {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .sidebar-tabs button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
    }

    .conv-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .conv-item:hover { background: rgba(255,255,255,0.05); }
    .conv-item.active { background: rgba(0,168,132,0.15); }
    .conv-item.handoff { border-left: 3px solid var(--warning); }

    .conv-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }
    .conv-avatar.handoff-avatar { background: var(--warning); }

    .conv-info { flex: 1; min-width: 0; }
    .conv-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      margin-top: 2px;
    }
    .conv-state {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
    }
    .conv-state.handoff-state { background: rgba(245,166,35,0.2); color: var(--warning); }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
    }

    .chat-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      flex-direction: column;
      gap: 8px;
    }

    .chat-header {
      padding: 12px 16px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header-info h3 {
      font-size: 15px;
      font-weight: 500;
    }
    .chat-header-info span {
      font-size: 12px;
      color: var(--text-muted);
    }

    .chat-header-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-handoff {
      background: var(--warning);
      color: #000;
    }
    .btn-release {
      background: var(--accent);
      color: #fff;
    }
    .btn-handoff:hover { opacity: 0.85; }
    .btn-release:hover { opacity: 0.85; }

    /* ===== MESSAGES ===== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13.5px;
      line-height: 1.45;
      position: relative;
      word-wrap: break-word;
    }

    .msg-time {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      text-align: right;
      margin-top: 4px;
    }

    .msg.inbound {
      background: var(--msg-in);
      align-self: flex-start;
      border-top-left-radius: 2px;
    }

    .msg.outbound {
      background: var(--msg-out);
      align-self: flex-end;
      border-top-right-radius: 2px;
    }

    .msg.human {
      background: var(--msg-human);
      align-self: flex-end;
      border-top-right-radius: 2px;
      border: 1px solid rgba(100,150,220,0.3);
    }
    .msg.human .msg-agent {
      font-size: 10px;
      color: #7ab0e6;
      margin-bottom: 2px;
    }

    .msg-type-badge {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .date-separator {
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      margin: 12px 0;
      padding: 4px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      align-self: center;
    }

    /* ===== INPUT ===== */
    .chat-input {
      padding: 12px 16px;
      background: var(--sidebar-bg);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input textarea {
      flex: 1;
      background: var(--chat-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      outline: none;
    }
    .chat-input textarea:focus { border-color: var(--accent); }
    .chat-input textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn svg { fill: #fff; width: 20px; height: 20px; }

    /* ===== LOGIN ===== */
    .login-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: var(--sidebar-bg);
      padding: 40px;
      border-radius: 12px;
      width: 380px;
      text-align: center;
    }
    .login-box h1 { font-size: 20px; margin-bottom: 8px; }
    .login-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      background: var(--chat-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-box button:hover { background: var(--accent-hover); }
    .login-error { color: var(--danger); font-size: 13px; margin-top: 8px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; }
      .chat-area { display: none; }
      .chat-area.mobile-active { display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; }
      .chat-messages { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>1Etiket WhatsApp</h1>
    <p>Yönetim paneline giriş yapın</p>
    <input type="password" id="secretInput" placeholder="Admin Secret Key" autofocus>
    <button onclick="doLogin()">Giriş Yap</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="mainApp" style="display:none;">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>1Etiket WhatsApp</h2>
      <span class="status-badge unknown" id="statusBadge">...</span>
    </div>
    <div class="sidebar-stats" id="statsBar">
      <span>Konuşma: <strong id="statConv">0</strong></span>
      <span>Handoff: <strong id="statHandoff">0</strong></span>
      <span>Bugün: <strong id="statToday">0</strong></span>
    </div>
    <div class="sidebar-tabs">
      <button class="active" onclick="switchTab('all', this)">Tümü</button>
      <button onclick="switchTab('handoff', this)">Bekleyenler</button>
    </div>
    <div class="conversation-list" id="convList"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea">
    <div class="chat-empty" id="chatEmpty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8696a0" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Konuşma seçin</span>
    </div>

    <div id="chatContent" style="display:none;flex-direction:column;height:100%;">
      <div class="chat-header">
        <div class="chat-header-info">
          <h3 id="chatName">—</h3>
          <span id="chatPhone">—</span>
        </div>
        <div class="chat-header-actions">
          <button class="btn btn-handoff" id="btnHandoff" onclick="toggleHandoff()">Devral</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input">
        <textarea id="msgInput" rows="1" placeholder="Mesaj yazın..." onkeydown="handleInputKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  let SECRET = '';
  let BASE = '';
  let currentPhone = null;
  let currentTab = 'all';
  let conversations = [];
  let pollTimer = null;
  let msgPollTimer = null;

  // ===== LOGIN =====
  function doLogin() {
    SECRET = document.getElementById('secretInput').value.trim();
    if (!SECRET) return;

    BASE = window.location.origin;

    fetch(`${BASE}/admin/stats`, { headers: { 'x-admin-secret': SECRET } })
      .then(r => {
        if (!r.ok) throw new Error('Geçersiz anahtar');
        return r.json();
      })
      .then(() => {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        sessionStorage.setItem('admin_secret', SECRET);
        startPolling();
      })
      .catch(() => {
        document.getElementById('loginError').textContent = 'Geçersiz anahtar';
      });
  }

  // Enter ile login
  document.getElementById('secretInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Session restore
  const saved = sessionStorage.getItem('admin_secret');
  if (saved) {
    document.getElementById('secretInput').value = saved;
    doLogin();
  }

  // ===== API CALLS =====
  function api(path, opts = {}) {
    return fetch(`${BASE}${path}`, {
      ...opts,
      headers: { 'x-admin-secret': SECRET, 'Content-Type': 'application/json', ...opts.headers }
    }).then(r => r.json());
  }

  // ===== POLLING =====
  function startPolling() {
    loadConversations();
    loadStats();
    pollTimer = setInterval(() => {
      loadConversations();
      loadStats();
    }, 5000);
  }

  async function loadStats() {
    try {
      const stats = await api('/admin/stats');
      document.getElementById('statConv').textContent = stats.totalConversations;
      document.getElementById('statHandoff').textContent = stats.activeHandoffs;
      document.getElementById('statToday').textContent = stats.todayMessages;

      const badge = document.getElementById('statusBadge');
      const monState = stats.monitor?.isConnected;
      if (monState === true) {
        badge.textContent = 'Bağlı';
        badge.className = 'status-badge connected';
      } else if (monState === false) {
        badge.textContent = 'Kopuk';
        badge.className = 'status-badge disconnected';
      } else {
        badge.textContent = '...';
        badge.className = 'status-badge unknown';
      }
    } catch (e) {}
  }

  async function loadConversations() {
    try {
      const endpoint = currentTab === 'handoff' ? '/admin/conversations/handoff' : '/admin/conversations';
      const data = await api(endpoint);
      conversations = data.conversations || data.handoffs || [];
      renderConversations();
    } catch (e) {}
  }

  function renderConversations() {
    const list = document.getElementById('convList');
    if (conversations.length === 0) {
      list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">Konuşma yok</div>';
      return;
    }

    list.innerHTML = conversations.map(c => {
      const isActive = c.phone === currentPhone;
      const isHandoff = c.isHumanHandoff;
      const initial = (c.name || '?')[0].toUpperCase();
      const time = c.lastActivity ? new Date(c.lastActivity).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }) : '';

      return `
        <div class="conv-item ${isActive ? 'active' : ''} ${isHandoff ? 'handoff' : ''}" onclick="openChat('${c.phone}')">
          <div class="conv-avatar ${isHandoff ? 'handoff-avatar' : ''}">${initial}</div>
          <div class="conv-info">
            <div class="conv-name">${esc(c.name || c.phone)}</div>
            <div class="conv-meta">
              <span class="conv-state ${isHandoff ? 'handoff-state' : ''}">${isHandoff ? 'BEKLIYOR' : c.state}</span>
              <span>${time}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ===== CHAT =====
  async function openChat(phone) {
    currentPhone = phone;
    renderConversations();

    document.getElementById('chatEmpty').style.display = 'none';
    const content = document.getElementById('chatContent');
    content.style.display = 'flex';
    document.getElementById('chatArea').classList.add('mobile-active');

    const conv = conversations.find(c => c.phone === phone);
    document.getElementById('chatName').textContent = conv?.name || phone;
    document.getElementById('chatPhone').textContent = phone;

    updateHandoffButton(conv?.isHumanHandoff);
    await loadMessages(phone);

    // Mesaj polling
    if (msgPollTimer) clearInterval(msgPollTimer);
    msgPollTimer = setInterval(() => loadMessages(phone), 3000);
  }

  async function loadMessages(phone) {
    if (phone !== currentPhone) return;
    try {
      const data = await api(`/admin/conversations/${phone}/messages?limit=100`);
      renderMessages(data.messages || []);
    } catch (e) {}
  }

  function renderMessages(messages) {
    const container = document.getElementById('chatMessages');
    const wasAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 50;

    let html = '';
    let lastDate = '';

    messages.forEach(m => {
      const d = new Date(m.created_at);
      const dateStr = d.toLocaleDateString('tr-TR');
      const timeStr = d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

      if (dateStr !== lastDate) {
        html += `<div class="date-separator">${dateStr}</div>`;
        lastDate = dateStr;
      }

      const dir = m.direction;
      let meta = '';
      if (dir === 'human') {
        const parsed = tryParse(m.metadata);
        meta = `<div class="msg-agent">Operatör: ${esc(parsed?.agent || 'admin')}</div>`;
      }
      if (m.message_type !== 'text' && m.message_type) {
        meta += `<div class="msg-type-badge">[${m.message_type}]</div>`;
      }

      html += `
        <div class="msg ${dir}">
          ${meta}
          <div>${esc(m.content).replace(/\n/g, '<br>')}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
      `;
    });

    container.innerHTML = html;
    if (wasAtBottom || !container.dataset.loaded) {
      container.scrollTop = container.scrollHeight;
      container.dataset.loaded = '1';
    }
  }

  // ===== SEND MESSAGE =====
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !currentPhone) return;

    input.value = '';
    input.style.height = 'auto';

    try {
      await api(`/admin/conversations/${currentPhone}/send`, {
        method: 'POST',
        body: JSON.stringify({ text, agent: 'admin' })
      });
      await loadMessages(currentPhone);
    } catch (e) {
      alert('Mesaj gönderilemedi: ' + e.message);
    }
  }

  function handleInputKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
    // Auto-resize
    const t = e.target;
    setTimeout(() => {
      t.style.height = 'auto';
      t.style.height = Math.min(t.scrollHeight, 120) + 'px';
    }, 0);
  }

  // ===== HANDOFF =====
  function updateHandoffButton(isHandoff) {
    const btn = document.getElementById('btnHandoff');
    if (isHandoff) {
      btn.textContent = 'Bota Bırak';
      btn.className = 'btn btn-release';
    } else {
      btn.textContent = 'Devral';
      btn.className = 'btn btn-handoff';
    }
  }

  async function toggleHandoff() {
    if (!currentPhone) return;
    const conv = conversations.find(c => c.phone === currentPhone);
    const endpoint = conv?.isHumanHandoff
      ? `/admin/conversations/${currentPhone}/release`
      : `/admin/conversations/${currentPhone}/handoff`;

    await api(endpoint, { method: 'POST', body: JSON.stringify({ agent: 'admin' }) });
    await loadConversations();
    const updated = conversations.find(c => c.phone === currentPhone);
    updateHandoffButton(updated?.isHumanHandoff);
  }

  // ===== TABS =====
  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadConversations();
  }

  // ===== UTIL =====
  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function tryParse(s) {
    try { return typeof s === 'string' ? JSON.parse(s) : s; } catch { return {}; }
  }
</script>
</body>
</html>
