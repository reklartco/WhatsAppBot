# 1etiket WhatsApp Bot + Evolution API — Nginx Reverse Proxy
# /etc/nginx/sites-available/whatsapp-bot olarak kopyalayın
# sudo ln -s /etc/nginx/sites-available/whatsapp-bot /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name bot.1etiket.com.tr;

    # Let's Encrypt SSL için
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS yönlendirme
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name bot.1etiket.com.tr;

    # SSL sertifikaları (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/bot.1etiket.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.1etiket.com.tr/privkey.pem;

    # SSL güvenlik
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Upload boyut limiti
    client_max_body_size 25M;

    # ===== Evolution API Webhook =====
    location /webhook/evolution {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ===== WooCommerce Webhook =====
    location /webhook/woocommerce {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ===== Health Check =====
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
    }

    # ===== Chat Paneli =====
    location /panel/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Admin API (sadece güvenli ağdan) =====
    location /admin/ {
        # İsteğe bağlı: sadece belirli IP'lerden erişime izin ver
        # allow 88.xxx.xxx.xxx;  # Sizin IP'niz
        # deny all;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Evolution API Dashboard (opsiyonel) =====
    location /evolution/ {
        # Sadece admin erişimi
        # allow 88.xxx.xxx.xxx;
        # deny all;

        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Diğer her şeyi engelle
    location / {
        return 404;
    }
}
