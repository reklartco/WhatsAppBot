# 1etiket WhatsApp Bot — Nginx Reverse Proxy
# Bu dosyayı /etc/nginx/sites-available/whatsapp-bot olarak kopyalayın
# sudo ln -s /etc/nginx/sites-available/whatsapp-bot /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name bot.1etiket.com.tr;  # Kendi subdomain'inizi yazın

    # Let's Encrypt SSL için
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS yönlendirme
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name bot.1etiket.com.tr;

    # SSL sertifikaları (Let's Encrypt ile oluşturulur)
    ssl_certificate /etc/letsencrypt/live/bot.1etiket.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.1etiket.com.tr/privkey.pem;

    # SSL güvenlik ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Upload boyut limiti (baskı dosyaları için)
    client_max_body_size 25M;

    # WhatsApp webhook — Node.js'e yönlendir
    location /webhook/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Meta webhook timeout'u uzun tutma
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
    }

    # Diğer her şeyi engelle
    location / {
        return 404;
    }
}
